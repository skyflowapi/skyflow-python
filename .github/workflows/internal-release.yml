name: Internal Release

on:
  push:
    tags-ignore:
      - '*.*'
    paths-ignore:
      - "setup.py"
      - "*.yml"
      - "*.md"
      - "skyflow/version.py"
    branches:
      - release/*

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          token: ${{ secrets.PAT_ACTIONS }}
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v2
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel twine

      - name: Get Previous tag
        id: previoustag
        uses: WyriHaximus/github-action-get-previous-tag@v1
        with:
          fallback: 1.0.0

      - name: Bump Version
        run: |
          VERSION="${{ steps.previoustag.outputs.tag }}"
          SEMVER="$VERSION"
          SHA=$(git rev-parse --short "${GITHUB_SHA}")

          echo "Bumping package version to $VERSION-dev+$SHA"
          sed -E "s/current_version = .+/current_version = '$SEMVER-dev+$SHA'/g" setup.py > tempfile && cat tempfile > setup.py && rm -f tempfile
          sed -E "s/SDK_VERSION = .+/SDK_VERSION = '$SEMVER-dev+$SHA'/g" skyflow/version.py > tempfile && cat tempfile > skyflow/version.py && rm -f tempfile

          echo "--------------------------"
          echo "Done, Package now at $VERSION-dev+$SHA"


      - name: Commit changes
        run: |
          git config user.name ${{ github.actor }}
          git config user.email ${{ github.actor }}@users.noreply.github.com
          git add setup.py
          git add skyflow/version.py
          git commit -m "[AUTOMATED] Private Release ${{ steps.previoustag.outputs.tag }}-dev+$(git rev-parse --short $GITHUB_SHA)"
          git push origin ${{ github.ref_name }} -f

      - name: Build the package
        run: |
          python setup.py sdist bdist_wheel

      # - name: Publish to JFrog Artifactory
      #   env:
      #     TWINE_USERNAME: ${{ secrets.JFROG_USERNAME }}
      #     TWINE_PASSWORD: ${{ secrets.JFROG_PASSWORD }}
