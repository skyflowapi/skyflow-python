name: Monthly Dependency Audit

on:
  schedule:
    - cron: '0 9 1 * *'  # 1st of every month at 9am UTC
  workflow_dispatch:      

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Run dependency audit
        id: audit
        run: |
          REPORT=$(python ci-scripts/audit_deps.py requirements.txt setup.py)
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          python ci-scripts/audit_deps.py requirements.txt setup.py && echo "has_outdated=false" >> $GITHUB_OUTPUT || echo "has_outdated=true" >> $GITHUB_OUTPUT

      - name: Open GitHub Issue for outdated deps
        if: steps.audit.outputs.has_outdated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[AUTOMATED] Dependency audit - $(date +'%B %Y')" \
            --body "${{ steps.audit.outputs.report }}" \
            --label "dependencies"
